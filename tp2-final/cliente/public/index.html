<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Electromon Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="logo">
      <span class="logo-pill">PA</span>
      <div class="logo-text">
        <h1>Electromon Shop</h1>
        <p>Colecciones de Pokémon con estilo</p>
      </div>
    </div>
    <nav class="main-nav">
      <a href="/catalogo">Catálogo</a>
      <a href="/carrito">Carrito (<span id="cart-count">0</span>)</a>
    </nav>
  </header>

  <main class="container">
    <section class="intro">
      <h2>Bienvenido a PokeAesthetic Shop</h2>
      <p>Encontrá tus Pokémon favoritos con estética única. Coleccionables, figuras y más.</p>
      <a href="/catalogo" class="btn-primary" style="display:inline-block; margin-top:1rem;">Ver catálogo</a>
    </section>
  </main>

  <footer class="site-footer">
    <small>Venezia Milagros, Maldonado Tomas - Aplicaciones Web II - Electromon Shop</small>
  </footer>

  <script src="/js/script.js"></script>

</html>
